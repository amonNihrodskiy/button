<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Важный вопрос</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: #fdf8f9;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .petals {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .petal {
    position: absolute;
    width: 9px;
    height: 15px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0%   { transform: translateY(-30px) rotate(0deg); opacity: 0; }
    8%   { opacity: 0.55; }
    92%  { opacity: 0.35; }
    100% { transform: translateY(110vh) rotate(400deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: #fff;
    border-radius: 24px;
    border: 1px solid #f0e0e6;
    padding: 3rem 2.5rem;
    width: 340px;
    max-width: calc(100% - 2rem);
    text-align: center;
    box-shadow: 0 4px 32px rgba(201,99,122,0.07);
  }

  .desktop-block {
    display: none;
  }

  @media (min-width: 700px) {
    #mainCard { display: none; }
    .desktop-block { display: block; }
  }

  .desktop-block .heart-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 1.4rem;
  }

  .desktop-block .question {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: #2c1a22;
    line-height: 1.45;
    margin-bottom: 0.5rem;
  }

  .desktop-block .subtext {
    font-size: 13px;
    font-weight: 300;
    color: #b8909a;
    letter-spacing: 0.04em;
  }

  .heart-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 1.4rem;
    animation: heartbeat 2.2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%     { transform: scale(1.16); }
    28%     { transform: scale(1); }
    42%     { transform: scale(1.09); }
    70%     { transform: scale(1); }
  }

  .question {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 30px;
    font-weight: 300;
    font-style: italic;
    color: #2c1a22;
    line-height: 1.45;
    margin-bottom: 0.55rem;
  }

  .subtext {
    font-size: 12.5px;
    font-weight: 300;
    color: #b8909a;
    letter-spacing: 0.04em;
    margin-bottom: 2.4rem;
  }

  .btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: nowrap;
  }

  .btn-yes {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    padding: 12px 38px;
    border-radius: 999px;
    border: none;
    background: #c9637a;
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }
  .btn-yes:hover { background: #b5506a; transform: scale(1.04); }

  .btn-no {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    padding: 12px 38px;
    border-radius: 999px;
    border: 1.5px solid #e8c8cf;
    background: transparent;
    color: #a07080;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
  }
  .btn-no:hover { background: #fdf5f6; border-color: #c9a0aa; transform: scale(1.04); }

  .initial, .response { transition: opacity 0.35s; }
  .response { display: none; }

  .resp-emoji {
    font-size: 54px;
    display: block;
    margin-bottom: 1rem;
    animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .resp-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    font-style: italic;
    color: #2c1a22;
    margin-bottom: 0.6rem;
    animation: fadeUp 0.5s 0.1s both;
  }

  .resp-body {
    font-size: 13.5px;
    font-weight: 300;
    color: #8a6070;
    line-height: 1.8;
    animation: fadeUp 0.5s 0.2s both;
  }

  @keyframes fadeUp {
    from { transform: translateY(14px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="desktop-block card">
  <span class="heart-icon">📱</span>
  <p class="question">Открой эту страницу с телефона</p>
  <p class="subtext">Здесь тебя ждёт что-то важное&nbsp;♡</p>
</div>

<div class="card" id="mainCard">
  <div class="initial" id="initial">
    <span class="heart-icon" id="mainHeart">🌸</span>
    <p class="question" id="mainQuestion">Хочешь стать моей девушкой? ♡</p>
    <p class="subtext" id="mainSubtext">Мне очень важен твой ответ.</p>
    <div class="btns">
      <button class="btn-yes" onclick="answer(true)">Да ♡</button>
      <button class="btn-no" onclick="noClicked()">Нет</button>
    </div>
  </div>

  <div class="response" id="resp">
    <span class="resp-emoji" id="respEmoji"></span>
    <div class="resp-title" id="respTitle"></div>
    <div class="resp-body"  id="respBody"></div>
  </div>
</div>

<script>
  const FORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSfAtkwpmsN4MY7pskxvB9iyoHhzsXUJYDtJtdFMMMKihyGSYQ/formResponse';
  const ENTRY    = 'entry.256520734';

  function sendAnswer(value) {
    const url = `${FORM_BASE}?${ENTRY}=${encodeURIComponent(value)}&submit=Submit`;
    fetch(url, { method: 'GET', mode: 'no-cors' }).catch(() => {});
  }

  const colors = ['#f4b8c8','#f9d0da','#e8a0b4','#fce4ec','#f48fb1','#fdd5de'];
  const petals = document.getElementById('petals');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `left:${Math.random()*100}%;top:${-Math.random()*15}px;background:${colors[i%colors.length]};animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*7}s;transform:rotate(${Math.random()*360}deg)`;
    petals.appendChild(p);
  }

  function showResponse(yes) {
    document.getElementById('initial').style.display = 'none';
    const resp = document.getElementById('resp');
    resp.style.display = 'block';

    if (yes) {
      document.getElementById('respEmoji').textContent  = '🌷';
      document.getElementById('respTitle').textContent  = 'Ты сделала меня счастливым';
      document.getElementById('respBody').innerHTML     = 'Теперь всё официально.<br>Я очень рад, что ты рядом.&nbsp;♡';
    } else {
      document.getElementById('respEmoji').textContent  = '🥺';
      document.getElementById('respTitle').textContent  = 'Ну ладно...';
      document.getElementById('respBody').innerHTML     = 'Я буду ждать, сколько потребуется.<br>Ты того стоишь.';
    }
  }

  function answer(yes) {
    sendAnswer(yes ? 'да' : 'нет');
    localStorage.setItem('proposalAnswer', yes ? 'yes' : 'no');
    showResponse(yes);
  }

  // Escalation stages for "No"
  const noStages = [
    {
      question: 'Ты точно уверена? ♡',
      subtext: 'Подумай ещё разок.'
    },
    {
      question: 'Точно-точно уверена?',
      subtext: 'Я просто хочу убедиться.'
    },
    {
      question: 'Это последний раз.',
      subtext: 'Теперь подумай хорошо и решай.'
    }
  ];

  let noStep = 0;

  function noClicked() {
    if (noStep < noStages.length) {
      const stage = noStages[noStep];
      document.getElementById('mainQuestion').textContent = stage.question;
      document.getElementById('mainSubtext').textContent  = stage.subtext;
      noStep++;
    } else {
      answer(false);
    }
  }

  // Restore previous answer on load
  const saved = localStorage.getItem('proposalAnswer');
  if (saved === 'yes') {
    showResponse(true);
  } else if (saved === 'no') {
    showResponse(false);
  }

  // Reset for testing: open the page with ?reset at the end of the URL
  if (window.location.search.includes('reset')) {
    localStorage.removeItem('proposalAnswer');
  }
</script>
</body>
</html>
