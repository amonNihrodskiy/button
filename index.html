<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Любвеграм 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fdf4f9;
      --surface: #ffffff;
      --surface-2: #fce7f3;
      --border: rgba(236, 72, 153, 0.15);
      --text: #1a0a12;
      --hint: #9d7b8a;
      --accent: #ec4899;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 20% 10%, rgba(251,207,232,0.6) 0%, transparent 45%),
        radial-gradient(circle at 80% 90%, rgba(253,230,244,0.5) 0%, transparent 40%);
      color: var(--text);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .petal {
      position: fixed; pointer-events: none; font-size: 18px;
      animation: floatDown linear infinite; opacity: 0; z-index: 0;
    }
    @keyframes floatDown {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.55; } 90% { opacity: 0.3; }
      100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }
    .desktop-block {
      position: fixed; inset: 0; background: var(--bg); color: var(--text);
      display: none; align-items: center; justify-content: center;
      text-align: center; padding: 32px; z-index: 20; flex-direction: column; gap: 16px;
    }
    .desktop-block span { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; }
    .desktop-block p { font-size: 16px; color: var(--hint); }

    .phone-app {
      width: 100%; max-width: 420px; height: min(94vh, 860px);
      border-radius: 30px; background: var(--surface); border: 1px solid var(--border);
      box-shadow: 0 32px 80px rgba(236,72,153,0.18), 0 0 0 1px rgba(255,255,255,0.9) inset;
      overflow: hidden; display: flex; flex-direction: column; position: relative; z-index: 1;
    }

    /* Header */
    .messenger-header {
      padding: 14px 16px; background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 11px;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #fbcfe8, #f9a8d4);
      display: grid; place-items: center; font-size: 20px;
      box-shadow: 0 2px 8px rgba(236,72,153,0.25); flex-shrink: 0;
    }
    .chat-title { font-size: 15px; font-weight: 600; }
    .chat-sub { font-size: 11.5px; color: var(--hint); margin-top: 1px; }
    .trash-btn {
      border: none; background: transparent; cursor: pointer; padding: 6px;
      border-radius: 50%; color: var(--hint); display: grid; place-items: center;
      transition: color 0.2s, background 0.2s; flex-shrink: 0;
    }
    .trash-btn:hover { color: var(--danger); background: var(--danger-bg); }
    .trash-btn svg { width: 20px; height: 20px; }

    /* Chat */
    .chat-body {
      flex: 1; padding: 14px 14px 0; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px; scrollbar-width: none;
    }
    .chat-body::-webkit-scrollbar { display: none; }

    .bubble {
      max-width: 88%; padding: 10px 14px; border-radius: 18px;
      line-height: 1.45; font-size: 14px; word-break: break-word;
      animation: bubbleIn 0.22s ease;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }
    .bubble.system {
      background: var(--surface-2); align-self: flex-start; border-top-left-radius: 6px;
    }
    .bubble.user {
      background: linear-gradient(135deg, #fbcfe8, #f472b6);
      color: #4a0023; align-self: flex-end; border-top-right-radius: 6px; font-weight: 500;
    }

    /* Card bubble */
.card-bubble {
  align-self: flex-start;
  max-width: 88%;
  cursor: pointer;
  animation: bubbleIn 0.3s ease;
  border-radius: 18px;
  border-top-left-radius: 6px;

  /* ВАЖНО */
  overflow: visible;

  box-shadow: 0 6px 24px rgba(0,0,0,0.13);
  position: relative;
}
    .card-div {
      padding: 22px 20px 20px; border-radius: 18px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 5px; position: relative; overflow: hidden;
      min-width: 200px;
    }
    .card-div::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 110px; height: 110px; border-radius: 50%; background: rgba(255,255,255,0.18);
    }
    .card-div::after {
      content: ''; position: absolute; bottom: -20px; left: -20px;
      width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.13);
    }
    .card-div .c-title { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; opacity: 0.6; }
    .card-div .c-emoji { font-size: 40px; line-height: 1; margin: 5px 0 3px; }
    .card-div .c-text  { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.25; }
    .card-div .c-sub   { font-size: 11.5px; line-height: 1.5; opacity: 0.72; white-space: pre-line; margin-top: 2px; }
    .card-div .c-dots  { margin-top: 8px; opacity: 0.35; font-size: 10px; letter-spacing: 5px; }
    .card-bubble .tap-hint {
      position: absolute; bottom: 7px; right: 9px;
      font-size: 9px; color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.2); border-radius: 8px; padding: 2px 6px; pointer-events: none;
    }

    /* Phrase card */
    .phrase-card {
      margin: 10px 14px 6px; padding: 18px 16px 16px; border-radius: 20px;
      background: linear-gradient(135deg, #fce7f3 0%, #fdf2f8 100%);
      border: 1.5px solid rgba(236,72,153,0.25); text-align: center;
      position: relative; overflow: hidden;
    }
    .phrase-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 100px; height: 100px; border-radius: 50%;
      background: radial-gradient(circle, rgba(251,207,232,0.6) 0%, transparent 70%);
    }
    .phrase-label {
      font-size: 11px; font-weight: 600; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .phrase-text {
      font-family: 'Playfair Display', serif; font-size: 22px;
      font-weight: 700; color: #831843; line-height: 1.3; position: relative; z-index: 1;
    }

    /* Progress */
    .progress-area { padding: 6px 14px 8px; }
    .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .progress-label { font-size: 11.5px; color: var(--hint); font-weight: 500; }
    .progress-count { font-size: 12px; font-weight: 600; color: var(--accent); }
    .progress-track { height: 7px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #f9a8d4, #ec4899);
      transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 0 6px rgba(236,72,153,0.4);
    }

    /* Composer */
    .composer {
      padding: 10px 10px 12px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.96); display: flex; gap: 8px; align-items: center;
    }
    .composer input {
      flex: 1; border: 1.5px solid var(--border); outline: none;
      border-radius: 22px; padding: 11px 15px; font-size: 14.5px;
      font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg);
      transition: border-color 0.2s;
    }
    .composer input::placeholder { color: var(--hint); }
    .composer input:focus { border-color: rgba(236,72,153,0.5); }
    .send-btn {
      border: none; border-radius: 50%; width: 44px; height: 44px; flex-shrink: 0;
      background: linear-gradient(135deg, #f472b6, #ec4899); color: #fff;
      display: grid; place-items: center; cursor: pointer;
      box-shadow: 0 4px 14px rgba(236,72,153,0.4); transition: transform 0.15s;
    }
    .send-btn:active { transform: scale(0.92); }
    .send-btn svg { width: 20px; height: 20px; transform: translateX(1px); }

    .status { font-size: 12px; color: var(--hint); text-align: center; padding: 0 10px 6px; min-height: 18px; }
    .status.error { color: var(--danger); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 20px; animation: fadeIn 0.2s ease;
    }
    .lightbox.show { display: flex; }
    .lightbox-inner {
      animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.5);
    }
    .lightbox-inner .card-div {
      min-width: 260px; max-width: min(90vw, 340px);
      padding: 36px 30px 30px;
    }
    .lightbox-inner .c-emoji { font-size: 56px !important; }
    .lightbox-inner .c-text  { font-size: 26px !important; }
    .lightbox-inner .c-sub   { font-size: 15px !important; }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .lightbox-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      border-radius: 50%; width: 40px; height: 40px; font-size: 18px;
      cursor: pointer; display: grid; place-items: center; backdrop-filter: blur(4px);
    }

    @media (min-width: 900px), (pointer: fine) {
      .phone-app { display: none; }
      .desktop-block { display: flex; }
    }
  </style>
</head>
<body>

    // ── Карточка (HTML div, инлайн стили) ────────────────
function makeCardDiv(card) {
  const d = document.createElement('div');
  d.className = 'card-div';

  d.style.cssText = `
    background: linear-gradient(135deg, ${card.bg[0]}, ${card.bg[1]} 55%, ${card.bg[2]});
    color: ${card.accent};
    border: 1.5px solid ${card.accent};
    padding: 22px 20px 20px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
    min-width: 180px;
    box-sizing: border-box;
  `;

  const title = document.createElement('div');
  title.className = 'c-title';
  title.textContent = card.title;

  const emoji = document.createElement('div');
  emoji.className = 'c-emoji';
  emoji.textContent = card.emoji;

  const text = document.createElement('div');
  text.className = 'c-text';
  text.textContent = card.text;

  const sub = document.createElement('div');
  sub.className = 'c-sub';
  sub.textContent = card.sub;

  const dots = document.createElement('div');
  dots.className = 'c-dots';
  dots.textContent = '• • •';

  d.appendChild(title);
  d.appendChild(emoji);
  d.appendChild(text);
  d.appendChild(sub);
  d.appendChild(dots);

  return d;
}

    function addCardBubble(card, animate = true) {
      const wrap = document.createElement('div');
      wrap.className = 'card-bubble';
      if (!animate) wrap.style.animation = 'none';
      const cardEl = makeCardDiv(card);
cardEl.style.width = '100%';
wrap.appendChild(cardEl);
      const hint = document.createElement('div');
      hint.className = 'tap-hint'; hint.textContent = 'нажми чтобы открыть';
      wrap.appendChild(hint);
      wrap.addEventListener('click', () => openLightbox(card));
      chatBody.appendChild(wrap);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          chatBody.scrollTop = chatBody.scrollHeight;
        });
      });
    }

    // ── Лайтбокс ──────────────────────────────────────────
    const lightbox      = document.getElementById('lightbox');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(card) {
      const inner = lightbox.querySelector('.lightbox-inner');
      inner.innerHTML = '';
      const d = makeCardDiv(card);
      d.style.padding = '36px 30px 30px';
      d.style.minWidth = '260px';
      d.style.maxWidth = 'min(90vw, 340px)';
      // увеличим шрифты для лайтбокса
      d.children[1].style.fontSize = '56px'; // emoji
      d.children[2].style.fontSize = '26px'; // text
      d.children[3].style.fontSize = '15px'; // sub
      inner.appendChild(d);
      lightbox.classList.add('show');
    }
    lightboxClose.addEventListener('click', () => lightbox.classList.remove('show'));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('show'); });

    // ── State ─────────────────────────────────────────────
    function loadState() {
      try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(_) {}
      return { circles: 0, queue: [], history: [], usedCards: [] };
    }
    function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(_) {} }
    function shuffle(a) {
      const b = [...a];
      for (let i=b.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
      return b;
    }
    function buildQueue() { return shuffle(allPhrases).slice(0, TOTAL); }
    function getNextCardIdx(s) {
      if (!s.usedCards) s.usedCards = [];
      const idx = s.usedCards.length % CARDS.length;
      s.usedCards.push(idx);
      return idx;
    }

    // ── DOM ───────────────────────────────────────────────
    const chatBody      = document.getElementById('chatBody');
    const targetPhrase  = document.getElementById('targetPhrase');
    const composerForm  = document.getElementById('composerForm');
    const messageInput  = document.getElementById('messageInput');
    const statusText    = document.getElementById('statusText');
    const progressFill  = document.getElementById('progressFill');
    const progressCount = document.getElementById('progressCount');
    const trashBtn      = document.getElementById('trashBtn');

    // ── Init ──────────────────────────────────────────────
    let state = loadState();
    if (!state.queue || state.queue.length === 0) {
      state.queue = buildQueue();
      saveState(state);
    }

    if (state.history && state.history.length) {
      state.history.forEach(({ text, kind, cardIdx }) => {
        if (kind === 'card') addCardBubble(CARDS[cardIdx], false);
        else addBubble(text, kind, false);
      });
    }
    updateUI();

    // ── Helpers ───────────────────────────────────────────
    function addBubble(text, kind, animate = true) {
      const el = document.createElement('div');
      el.className = `bubble ${kind}`;
      if (!animate) el.style.animation = 'none';
      el.textContent = text;
      chatBody.appendChild(el);
      chatBody.scrollTop = chatBody.scrollHeight;
    }
    function updateUI() {
      const done = TOTAL - state.queue.length;
      progressFill.style.width = (done / TOTAL * 100) + '%';
      progressCount.textContent = `${done} / ${TOTAL}`;
      if (state.queue.length > 0) {
        targetPhrase.textContent = state.queue[0];
      }
      statusText.textContent = ''; statusText.className = 'status';
    }

    // ── Submit ────────────────────────────────────────────
    composerForm.addEventListener('submit', e => {
      e.preventDefault();
      if (state.queue.length === 0) return;
      const value    = messageInput.value.trim();
      const expected = state.queue[0];
      if (value !== expected) {
        statusText.textContent = 'Нужно слово в слово, попробуй ещё ✍️';
        statusText.className = 'status error'; return;
      }
      addBubble(value, 'user');
      if (!state.history) state.history = [];
      state.history.push({ text: value, kind: 'user' });
      state.queue.shift();
      messageInput.value = ''; statusText.textContent = ''; statusText.className = 'status';

      const isComplete = state.queue.length === 0;
      const reply = replyMap[value] || 'Да, именно так 💗';

      const typing = document.createElement('div');
      typing.className = 'bubble system'; typing.textContent = '···'; typing.style.opacity = '0.6';
      chatBody.appendChild(typing); chatBody.scrollTop = chatBody.scrollHeight;

      setTimeout(() => {
        typing.remove();
        addBubble(reply, 'system');
        state.history.push({ text: reply, kind: 'system' });

        if (isComplete) {
          state.circles = (state.circles || 0) + 1;
          setTimeout(() => {
            const cardMsg = '🎁 Держи, это тебе:';
            addBubble(cardMsg, 'system');
            state.history.push({ text: cardMsg, kind: 'system' });
            setTimeout(() => {
const cardIdx = getNextCardIdx(state);

console.log('ADDING CARD:', cardIdx, CARDS[cardIdx]);

if (!CARDS[cardIdx]) {
  console.error('Карточка не найдена');
  return;
}

const card = CARDS[cardIdx];

addCardBubble(card);

// сохраняем СРАЗУ
state.history.push({ kind: 'card', cardIdx });
saveState(state);

// только потом сброс
state.queue = buildQueue();
updateUI();
			  
            }, 600);
          }, 800);
        } else {
          saveState(state); updateUI();
        }
      }, 950);
    });

    // ── Trash ─────────────────────────────────────────────
    trashBtn.addEventListener('click', () => {
      if (!confirm('Удалить всю историю и начать с нуля?')) return;
      localStorage.removeItem(STORAGE_KEY);
      state = { circles: 0, queue: buildQueue(), history: [], usedCards: [] };
      saveState(state);
      chatBody.innerHTML = '';
      addBubble('Привет, солнышко 💖', 'system', false);
      updateUI();
    });
  </script>
