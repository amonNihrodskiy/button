<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>С 8 Марта! 🌸</title>
<style>
  /* === БАЗОВЫЕ НАСТРОЙКИ === */
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
  body { height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #bfe9ff 0%, #ffe6f3 50%, #fff7d6 100%); }
  
  /* === СТАРТОВЫЙ ЭКРАН === */
  .start-screen {
    position: fixed; inset: 0; z-index: 5000;
    /* По умолчанию скрыт, JS решит показывать ли его */
    display: none; 
    flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #bfe9ff 0%, #ffe6f3 50%, #fff7d6 100%);
    text-align: center; padding: 20px;
    opacity: 0; 
    transition: opacity 0.8s ease, transform 0.8s ease; 
  }
  
  /* Класс для показа стартового экрана */
  .start-screen.active { display: flex; opacity: 1; }
  /* Класс для красивого скрытия (растворение + зум) */
  .start-screen.fade-out { opacity: 0; transform: scale(1.1); pointer-events: none; }
  
  .start-content { animation: float 3s ease-in-out infinite; }
  .start-emoji { font-size: 80px; margin-bottom: 20px; display: block; }
  .start-title { font-size: 28px; font-weight: 900; color: #2b1b2a; margin-bottom: 10px; line-height: 1.2; }
  .start-subtitle { font-size: 16px; font-weight: 600; color: #5a4b59; margin-bottom: 40px; max-width: 300px; margin-left: auto; margin-right: auto; }
  
  .start-btn {
    font-size: 20px; padding: 18px 45px; border-radius: 50px;
    background: linear-gradient(135deg, #ff8da1, #ff3385);
    color: white; border: none; font-weight: 800;
    box-shadow: 0 10px 30px rgba(255, 51, 133, 0.4);
    cursor: pointer; transition: transform 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .start-btn:active { transform: scale(0.95); }

  /* === ИГРОВОЙ КОНТЕЙНЕР === */
  .game-ui-container { 
    display: none; /* Скрыто до старта */
    width: 100%; height: 100%; 
  }
  .game-ui-container.visible { display: block; }

  /* === АНИМАЦИИ ПОЯВЛЕНИЯ === */
  @keyframes slideDownIn {
    from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  @keyframes popIn {
    from { transform: translateY(-50%) scale(0.8); opacity: 0; }
    to { transform: translateY(-50%) scale(1); opacity: 1; }
  }
  @keyframes slideUpIn {
    from { transform: translateX(-50%) translateY(100px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  /* === ИНТЕРФЕЙС ИГРЫ === */
  /* Изначально элементы скрыты (opacity 0), чтобы потом красиво появиться */
  .title { 
    position: fixed; top: 40px; left: 50%; transform: translateX(-50%); 
    font-size: clamp(20px, 5vw, 30px); font-weight: 900; color: #2b1b2a; 
    text-align: center; background: rgba(255,255,255,0.85); padding: 10px 22px; 
    border-radius: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); white-space: nowrap; z-index: 100;
    opacity: 0; /* Скрыто для анимации */
  }
  /* Класс запуска анимации заголовка */
  .title.animate-in { animation: slideDownIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

  .bottom-bar { 
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
    display: flex; gap: 15px; z-index: 1000; align-items: center; 
    opacity: 0; /* Скрыто для анимации */
  }
  /* Класс запуска анимации бара */
  .bottom-bar.animate-in { animation: slideUpIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  
  .score-board { background: rgba(255,255,255,0.95); padding: 10px 24px; border-radius: 30px; font-size: 15px; font-weight: 800; color: #2b1b2a; box-shadow: 0 8px 25px rgba(255,90,160,0.25); display: flex; align-items: center; gap: 8px; transition: transform 0.15s; white-space: nowrap;}
  .score-board.pop {  }
  
  .wallet-btn { background: linear-gradient(135deg, #ff8da1, #ff3385); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; border: none; box-shadow: 0 8px 20px rgba(255,51,133,0.4); cursor: pointer; transition: transform 0.2s; position: relative; }
  .wallet-btn:active { transform: scale(0.9); }
  .wallet-badge { position: absolute; top: -5px; right: -5px; background: white; color: #ff3385; font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  
  .restart-btn { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%) scale(0.8); background: rgba(255,255,255,0.85); border: 2px solid #ff8da1; color: #ff3385; padding: 10px 24px; border-radius: 25px; font-weight: 800; font-size: 15px; cursor: pointer; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); z-index: 100; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(255,51,133,0.2); }
  .restart-btn.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
  .restart-btn:active { transform: translateX(-50%) scale(0.95); }

  /* === КАРТОЧКИ (ОБЩИЕ) === */
  .deck { 
    position: relative; width: min(420px, 92vw); height: min(580px, 86vh); 
    margin: auto; top: 50%; transform: translateY(-50%); 
    opacity: 0; /* Скрыто для анимации */
  }
  /* Класс запуска анимации колоды */
  .deck.animate-in { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

  .card {
	cursor: pointer;
    position: absolute; left: 50%; top: 50%; 
    width: 100%; 
    transform: translate(-50%, -50%); 
    background: #ffffff; border-radius: 18px; padding: 14px; 
    border: 1px solid rgba(0,0,0,0.06); 
    box-shadow: 0 22px 55px rgba(0,0,0,0.16); 
    display: flex; flex-direction: column; gap: 12px; 
    touch-action: none; will-change: transform, opacity; 
  }
  .card.back1 { transform: translate(-50%, -50%) translate(10px, 10px) rotate(2deg) scale(0.985); opacity: 0.78; filter: blur(0.2px); }
  .card.back2 { transform: translate(-50%, -50%) translate(-10px, 16px) rotate(-2deg) scale(0.97); opacity: 0.55; filter: blur(0.25px); }
  
  .photo { height: 360px; border-radius: 14px; background: radial-gradient(circle at 25% 20%, rgba(255,90,160,0.22), transparent), radial-gradient(circle at 75% 22%, rgba(255,184,77,0.22), transparent), linear-gradient(180deg, rgba(191,233,255,0.55), rgba(255,230,243,0.65)); border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; font-size: 64px; }
  .text { min-height: 54px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 900; font-size: 17px; line-height: 1.35; color: #2b1b2a; padding: 0 8px; }
  .caption { text-align: center; font-size: 13px; font-weight: 800; color: rgba(43,27,42,0.55); padding-bottom: 2px; }
  
  /* Спец-карточки (Золотые) */
  .card.special { background: linear-gradient(135deg, #fffcf0 0%, #ffffff 100%); border: 2px solid #ffcc00; box-shadow: 0 15px 45px rgba(255,204,0,0.35), 0 0 15px rgba(255,204,0,0.4); }
  .card.special .photo { background: radial-gradient(circle at 30% 25%, rgba(255,204,0,0.4), transparent), radial-gradient(circle at 70% 30%, rgba(255,90,160,0.3), transparent), linear-gradient(180deg, #fffae6, #ffe6f3); border: 1px solid rgba(255,204,0,0.3); }
  .card.special .text, .card.special .caption { color: #d62828; }
  .super-badge { position: absolute; top: -12px; right: -12px; background: linear-gradient(135deg, #ff5e62, #ff9966); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 900; font-size: 14px; box-shadow: 0 4px 12px rgba(255,94,98,0.5); transform: rotate(5deg); animation: pulseBadge 1.5s infinite; z-index: 10; }

  /* Карточка-вопрос */
  .card.question-card { background: linear-gradient(135deg, #f0f8ff 0%, #ffffff 100%); border: 2px solid #8daed1; }
  .card.question-card .photo { height: 270px; font-size: 50px; background: #eef6fc; margin-bottom: 5px; }
  .q-title { text-align: center; font-size: 19px; font-weight: 900; color: #2b4b7a; min-height: 40px; display: flex; align-items: center; justify-content: center; }
  .q-buttons { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; }
  .q-btn { border: none; background: linear-gradient(90deg, #6ba4ff, #4d8aff); color: white; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 10px rgba(77,138,255,0.3); transition: transform 0.1s; }
  .q-btn:active { transform: scale(0.96); }

  /* === Карточка-тапалка (СТИЛЬ КАК У ОБЫЧНЫХ) === */
  .card.tap-card { cursor: pointer;
    background: #fff; border: 2px solid #ff8da1; 
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  }
  .tap-heart-wrapper { 
    height: 360px; width: 100%; 
    background: #fff0f5; border-radius: 14px; border: 1px solid rgba(0,0,0,0.05);
    display: flex; align-items: center; justify-content: center; position: relative; 
  }
  .tap-title { min-height: 54px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 20px; font-weight: 900; color: #d62828; }
  .tap-desc { text-align: center; font-size: 14px; font-weight: 800; color: #ff8da1; padding-bottom: 2px; }
  .tap-heart { 
    font-size: 140px; cursor: pointer; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    -webkit-tap-highlight-color: transparent;
    background: linear-gradient(to top, #ff3385 0%, #ff3385 var(--fill-percent, 0%), #ffe6f2 var(--fill-percent, 0%), #ffe6f2 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    -webkit-text-stroke: 2px #ff3385; 
  }
  .tap-heart:active { transform: scale(0.9); }

  /* === МОДАЛЬНЫЕ ОКНА === */
  .overlay { position: fixed; inset: 0; background: rgba(30,15,25,0.85); z-index: 99999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; will-change: opacity; }
  .overlay.active { opacity: 1; pointer-events: auto; }
  .prize-card { background: linear-gradient(135deg, #fff9e6 0%, #fff 100%); width: min(380px, 90vw); padding: 30px 20px; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 2px solid #ffb84d; transform: scale(0.85); opacity: 0; transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.3s; display: flex; flex-direction: column; gap: 15px; }
  .overlay.active .prize-card { transform: scale(1); opacity: 1; }
  .prize-icon { font-size: 60px; line-height: 1; animation: float 3s ease-in-out infinite; }
  .prize-title { font-size: 24px; font-weight: 900; color: #ff3385; text-transform: uppercase; }
  .prize-desc { font-size: 16px; font-weight: 600; color: #5a4b59; line-height: 1.4; min-height: 44px; }
  .prize-note { font-size: 13px; font-weight: 700; color: #ff8da1; }
  .btn { border: none; padding: 14px 24px; font-size: 17px; font-weight: 800; border-radius: 30px; cursor: pointer; transition: transform 0.2s; }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: linear-gradient(90deg, #ff3385, #ff8da1); color: white; box-shadow: 0 8px 20px rgba(255,51,133,0.4); }
  .btn-secondary { background: #f0e6f2; color: #5a4b59; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  
  .wallet-modal { background: #fff; width: min(400px, 95vw); max-height: 85vh; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transform: scale(0.9); opacity: 0; transition: transform 0.3s ease, opacity 0.3s; }
  .overlay.active .wallet-modal { transform: scale(1); opacity: 1; }
  .wallet-header { display: flex; justify-content: space-between; align-items: center; }
  .wallet-title { font-size: 22px; font-weight: 900; color: #2b1b2a; }
  .close-btn { background: none; border: none; font-size: 32px; color: #ccc; cursor: pointer; padding: 0 5px; }
  .coupons-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; margin-bottom: 5px; -webkit-overflow-scrolling: touch; }
  .coupons-list::-webkit-scrollbar { width: 6px; }
  .coupon-item { background: #fdf2f8; border: 2px dashed #ffb8d2; padding: 12px 15px; border-radius: 14px; display: flex; gap: 15px; align-items: center; }
  .coupon-item.locked { background: #f5f5f5; border: 2px dashed #e0e0e0; filter: grayscale(1); opacity: 0.7; }
  .coupon-item.locked .c-name { color: #888; }
  .c-icon { font-size: 28px; }
  .c-info { display: flex; flex-direction: column; text-align: left; }
  .c-name { font-weight: 800; font-size: 15px; color: #2b1b2a; }
  .c-desc { font-size: 12px; font-weight: 600; color: #777; margin-top: 2px; line-height: 1.2; }



/* Зарядка кнопки */
.start-btn.charge {
  animation: btnPulse 0.35s ease;
}

@keyframes btnPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1.08); }
}

/* Лёгкая тряска */
.start-btn.shake {
  animation: btnShake 0.25s;
}


/* финальный взрыв */
.start-btn.boom {
  animation: boomBtn 0.6s cubic-bezier(0.2,0.8,0.2,1) forwards;
}

@keyframes boomBtn {
  0% { transform: scale(1.3); opacity: 1; filter: blur(0); }
  40% { transform: scale(2); opacity: 1; }
  100% { transform: scale(4); opacity: 0; filter: blur(12px); }
}

/* Энергия за кнопкой */
.start-screen::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,120,170,0.45) 0%, rgba(255,120,170,0.15) 40%, transparent 70%);
  filter: blur(25px);
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 0.4s ease, transform 0.4s ease;
  pointer-events: none;
}

/* уровень зарядки */
.start-screen.energy-1::after { opacity: 0.1; transform: scale(1.0); }
.start-screen.energy-2::after { opacity: 0.2; transform: scale(1.0); }
.start-screen.energy-3::after { opacity: 0.3; transform: scale(1.0); }
.start-screen.energy-4::after { opacity: 0.4; transform: scale(1.0); }
.start-screen.energy-5::after { opacity: 0.5; transform: scale(1.0); }
.start-screen.energy-6::after { opacity: 0.6; transform: scale(1.0); }
.start-screen.energy-7::after { opacity: 0.7; transform: scale(1.0); }
.start-screen.energy-8::after { opacity: 0.8; transform: scale(1.0); }
.start-screen.energy-9::after { opacity: 0.9; transform: scale(1.0); }
.start-screen.energy-10::after { opacity: 1.0; transform: scale(1.0); }

  /* АНИМАЦИИ */
  .flower { position: fixed; top: -20px; font-size: 18px; pointer-events: auto; cursor: pointer; animation: fall linear forwards; z-index: 1; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  @keyframes pulseBadge { 0%, 100% { transform: rotate(5deg) scale(1); } 50% { transform: rotate(5deg) scale(1.1); } }

  /* АДАПТИВНОСТЬ */
  @media (max-width: 480px), (max-height: 760px) {
    .deck { width: min(420px, 94vw); height: min(560px, 78vh); }
    .card { padding: 12px; border-radius: 16px; gap: 10px; }
    .photo, .tap-heart-wrapper { height: min(300px, 42vh); border-radius: 12px; font-size: 56px; }
    .text, .tap-title { min-height: 46px; font-size: 16px; line-height: 1.25; padding: 0 6px; }
    .caption, .tap-desc { font-size: 12px; padding-bottom: 0; }
    .title { top: 18px; padding: 8px 16px; border-radius: 12px; font-size: clamp(18px, 4.5vw, 24px); }
    .bottom-bar { bottom: 16px; gap: 10px; }
    .score-board { padding: 8px 16px; font-size: 13px; border-radius: 26px; }
    .restart-btn { bottom: 92px; }
    .card.question-card .photo { height: 220px; font-size: 40px; }
    .q-title { font-size: 16px; min-height: 36px; }
    .q-btn { padding: 12px; font-size: 14px; }
    .tap-heart { font-size: 120px; }
  }
  @media (max-width: 480px) {
    .deck { width: min(360px, 86vw); height: min(520px, 74vh); }
    .card { padding: 10px; } 
    .photo, .tap-heart-wrapper { height: min(260px, 38vh); }
    .card.question-card .photo { height: 190px; }
  }
  
.start-counter-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 26px;
  min-height: 190px;
  justify-content: center;
}

.start-counter {
  font-size: 128px;
  font-weight: 900;
  line-height: 0.95;
  margin-bottom: 10px;
  color: #ff3385;
  text-shadow: 0 8px 24px rgba(255, 51, 133, 0.22), 0 0 20px rgba(255, 141, 161, 0.35);
  transition: color 0.35s ease, text-shadow 0.35s ease, transform 0.35s ease;
}

.start-counter-text {
  min-height: 28px;
  font-size: 22px;
  font-weight: 800;
  color: #7a4b63;
  letter-spacing: 1px;
  text-shadow: 0 3px 10px rgba(255,255,255,0.65);
  transition: color 0.35s ease, text-shadow 0.35s ease, transform 0.35s ease;
}

/* красивое появление новой цифры/даты */
.start-counter-wrap.counter-switch .start-counter,
.start-counter-wrap.counter-switch .start-counter-text {
  animation: counterSwapIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
}

@keyframes counterSwapIn {
  0% { opacity: 0; transform: translateY(-18px) scale(0.88); filter: blur(6px); }
  60% { opacity: 1; transform: translateY(4px) scale(1.04); filter: blur(0); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* оформление под "месяцы" */
.start-counter.theme-8, .start-counter-text.theme-8 { color: #ff5c8a; text-shadow: 0 8px 24px rgba(255,92,138,0.24), 0 0 18px rgba(255,150,190,0.35); } /* июль */
.start-counter.theme-7, .start-counter-text.theme-7 { color: #ff8a3d; text-shadow: 0 8px 24px rgba(255,138,61,0.24), 0 0 18px rgba(255,190,120,0.35); } /* август */
.start-counter.theme-6, .start-counter-text.theme-6 { color: #c56cf0; text-shadow: 0 8px 24px rgba(197,108,240,0.24), 0 0 18px rgba(220,170,255,0.35); } /* сентябрь */
.start-counter.theme-5, .start-counter-text.theme-5 { color: #ff9f43; text-shadow: 0 8px 24px rgba(255,159,67,0.24), 0 0 18px rgba(255,210,140,0.35); } /* октябрь */
.start-counter.theme-4, .start-counter-text.theme-4 { color: #8c7ae6; text-shadow: 0 8px 24px rgba(140,122,230,0.24), 0 0 18px rgba(185,175,245,0.35); } /* ноябрь */
.start-counter.theme-3, .start-counter-text.theme-3 { color: #4facfe; text-shadow: 0 8px 24px rgba(79,172,254,0.24), 0 0 18px rgba(150,210,255,0.35); } /* декабрь */
.start-counter.theme-2, .start-counter-text.theme-2 { color: #00b894; text-shadow: 0 8px 24px rgba(0,184,148,0.24), 0 0 18px rgba(120,235,210,0.35); } /* январь */
.start-counter.theme-1, .start-counter-text.theme-1 { color: #6c5ce7; text-shadow: 0 8px 24px rgba(108,92,231,0.24), 0 0 18px rgba(170,160,255,0.35); } /* февраль */
.start-counter.theme-0, .start-counter-text.theme-0 { color: #ff3385; text-shadow: 0 8px 24px rgba(255,51,133,0.28), 0 0 20px rgba(255,141,161,0.45); } /* март */

@media (max-width: 480px), (max-height: 760px) {
  .start-counter-wrap { min-height: 150px; margin-bottom: 20px; }
  .start-counter { font-size: 96px; margin-bottom: 8px; }
  .start-counter-text { font-size: 17px; min-height: 24px; }
}

@media (max-width: 480px) {
  .start-counter { font-size: 82px; }
  .start-counter-text { font-size: 15px; }
}
  
.start-counter-text {
  white-space: pre-line;
}

</style>
</head>
<body>

<!-- СТАРТОВЫЙ ЭКРАН -->
<div class="start-screen" id="startScreen">
  <div class="start-content">
    <div class="start-counter-wrap" id="startCounterWrap">
      <div class="start-counter" id="startCounter">8</div>
      <div class="start-counter-text" id="startCounterText">До сих пор помню, как пол часа сидел с телефоном и не знал что тебе написать...</div>
    </div>
    <button class="start-btn" id="startBtn" onclick="startGame()">Нажми меня</button>
  </div>
</div>

<!-- ИГРОВОЙ КОНТЕЙНЕР -->
<div id="gameUI" class="game-ui-container">
  <!-- Заголовок -->
  <div class="title" id="gameTitle">С 8 марта, моя маленькая 🌸</div>

  function triggerSuperPrize() {
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    for (let i = 0; i < 3; i++) setTimeout(() => heartBurst(cx, cy, 30, window.innerWidth/1.5, rand(["🌸", "✨", "💖", "🎉"])), i * 150);

    if (unlockedCoupons.length >= ALL_COUPONS.length) {
      pendingFinal = true;
      return showPrizeModal("💖", "Поздравляю с 8 марта!", "С праздником тебя, мой любимый маффинчик с травкой.<br> Я очень сильно тебя люблю 💕", "Все купоны доступны для просмотра в кошельке!", false);
    }

    const unowned = ALL_COUPONS.filter(c => !unlockedCoupons.includes(c.id)), owned = ALL_COUPONS.filter(c => unlockedCoupons.includes(c.id));
    const randomCoupon = (unowned.length > 0 && Math.random() < 0.85) ? rand(unowned) : (owned.length > 0 ? rand(owned) : rand(unowned));
    
    if (unlockedCoupons.includes(randomCoupon.id)) {
      showPrizeModal("😅", "Дубликат...", `Тебе выпал "${randomCoupon.title}", но он у тебя уже есть!`, "Свайпай дальше, чтобы найти оставшиеся купоны!", true);
    } else {
      unlockedCoupons.push(randomCoupon.id); saveCoupons();
      showPrizeModal(randomCoupon.icon, "Новый Купон!", `<b>${randomCoupon.title}</b><br><br>${randomCoupon.desc}`, "Сохранено в твой кошелек 💌", false);
    }
  }

  function claimPrize() {
    const btnRect = document.getElementById('pBtn').getBoundingClientRect();
    heartBurst(btnRect.left + btnRect.width/2, btnRect.top + btnRect.height/2, 40, 300, "💖");
    prizeOverlay.classList.remove("active"); score = 0; isPrizeTriggered = false;
    if (pendingFinal) { pendingFinal = false; isInfiniteMode = true; localStorage.setItem('8march_final', 'true'); restartBtn.classList.add('show'); }
    updateScoreUI();
  }

  function renderWalletHTML() {
    document.getElementById('couponsList').innerHTML = ALL_COUPONS.map(c => {
      const isUnlocked = unlockedCoupons.includes(c.id);
      return `<div class="coupon-item ${isUnlocked ? '' : 'locked'}"><div class="c-icon">${isUnlocked ? c.icon : '🔒'}</div><div class="c-info"><div class="c-name">${c.title}</div><div class="c-desc">${isUnlocked ? c.desc : 'Свайпай, чтобы открыть этот купон...'}</div></div></div>`;
    }).join("");
  }

  function openWallet() { renderWalletHTML(); requestAnimationFrame(() => walletOverlay.classList.add('active')); }
  function closeWallet() { walletOverlay.classList.remove('active'); }

  function hardReset() {
    if (confirm("Точно хочешь удалить все собранные купоны и начать игру заново?")) {
      unlockedCoupons = []; 
      localStorage.removeItem('8march_coupons'); 
      localStorage.removeItem('8march_final'); 
      localStorage.removeItem('8march_started'); // Сброс старта
      saveCoupons();
      // Перезагрузка страницы
      location.reload(); 
    }
  }

  // --- ОБРАБОТЧИКИ КАРТОЧЕК ---
  
  // 1. Вопрос (+2 очка)
  function onQuestionAnswer(btn, cardEl) {
    const rect = btn.getBoundingClientRect(); heartBurst(rect.left + rect.width/2, rect.top + rect.height/2, 15, 60, "✨");
    score += 2; updateScoreUI();
    cardEl.style.transition = "transform 0.4s ease, opacity 0.3s ease"; cardEl.style.transform = "translate(-50%, -150%) rotate(-5deg)"; cardEl.style.opacity = "0";
    if (!isInfiniteMode && score >= GOAL && !isPrizeTriggered) { isPrizeTriggered = true; setTimeout(triggerSuperPrize, 600); }
    setTimeout(() => { removeTopCard(); }, 350);
  }

  // 2. Тапалка (+5 очков)
  function onHeartTap(heartEl, cardEl, descEl) {
    let taps = parseInt(heartEl.dataset.taps || 0) + 1;
    heartEl.dataset.taps = taps;
    
    // Анимация заполнения сердца (через CSS переменную)
    let percent = taps * 10;
    heartEl.style.setProperty('--fill-percent', percent + '%');
    
    // Обновляем текст (обратный отсчет)
    let left = 10 - taps;
    if (left > 0) descEl.innerText = `Нажми ${left} раз`;
    else descEl.innerText = "Готово!";

    let scale = 1 + (taps * 0.05); heartEl.style.transform = `scale(${scale})`;
    setTimeout(() => heartEl.style.transform = `scale(${scale - 0.02})`, 100);
    
    const rect = heartEl.getBoundingClientRect(); heartBurst(rect.left + rect.width/2, rect.top + rect.height/2, 5, 40, "💗");

    if (taps >= 10) { // Победа
      heartBurst(rect.left + rect.width/2, rect.top + rect.height/2, 30, 150, "💖");
      score += 5; updateScoreUI();
      if (!isInfiniteMode && score >= GOAL && !isPrizeTriggered) { isPrizeTriggered = true; setTimeout(triggerSuperPrize, 600); }
      
      cardEl.style.transition = "transform 0.5s ease, opacity 0.5s"; cardEl.style.transform = "scale(1.5)"; cardEl.style.opacity = "0";
      setTimeout(() => { removeTopCard(); }, 400);
    }
  }

  function removeTopCard() {
    stackEls[0].remove(); stackEls.shift(); stackEls.push(createCard(false));
    if (stackEls[0]) { stackEls[0].style.transition = 'none'; stackEls[0].style.transform = 'translate(-50%,-50%)'; requestAnimationFrame(() => stackEls[0].style.transition = 'transform 220ms ease, opacity 220ms ease'); }
    layout(); attachTopHandlers();
  }

function createCard(isTop) {
  const el = document.createElement('div');
  cardsSinceLastSpecial++;

  let cardType = 'normal';

  // Логика спавна: минимум 3 обычных после последней особой
  if (cardsSinceLastSpecial > 3) {
    if (Math.random() < 0.3) {
      const r = Math.random();
      if (r < 0.5) cardType = 'question';
      else if (r < 0.8) cardType = 'gold';
      else cardType = 'tap';
      cardsSinceLastSpecial = 0;
    }
  }

  if (cardType === 'tap') {
    el.className = 'card tap-card';
    el.innerHTML = `
      <div class="super-badge" style="background: linear-gradient(135deg, #ff9a9e, #fecfef);">🔥 Жми! (+5)</div>
      <div class="tap-title">Наполни сердце!</div>
      <div class="tap-heart-wrapper">
        <div class="tap-heart">❤</div>
      </div>
      <div class="tap-desc">Нажми 10 раз</div>
    `;

    const heart = el.querySelector('.tap-heart');
    const desc = el.querySelector('.tap-desc');

    // клик по сердцу
    heart.onclick = (e) => {
      e.stopPropagation();
      onHeartTap(heart, el, desc);
    };

    // клик по карточке
    el.onclick = () => {
      onHeartTap(heart, el, desc);
    };

  } else if (cardType === 'question') {
    el.className = 'card question-card';
    const qData = rand(QUESTIONS);
    el.innerHTML = `
      <div class="super-badge" style="background: linear-gradient(135deg, #6ba4ff, #4d8aff);">❓ Вопрос (+2)</div>
      <div class="photo">🤔</div>
      <div class="q-title">${qData.q}</div>
      <div class="q-buttons">
        <button class="q-btn">${qData.a[0]}</button>
        <button class="q-btn">${qData.a[1] || "Да!"}</button>
      </div>
    `;
    el.querySelectorAll('.q-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        onQuestionAnswer(btn, el);
      };
    });

  } else if (cardType === 'gold') {
    el.className = 'card special';
    el.innerHTML = `
      <div class="super-badge">🌟 Особая (+3)</div>
      <div class="photo">${rand(specialEmojis)}</div>
      <div class="text">${rand(specialCards)}</div>
      <div class="caption">${rand(specialCaptions)}</div>
    `;

  } else {
    el.className = 'card';
    el.innerHTML = `
      <div class="photo">${rand(emojis)}</div>
      <div class="text">${rand(cards)}</div>
      <div class="caption">${rand(captions)}</div>
    `;
  }

  el.style.transition = isTop ? 'none' : 'transform 220ms ease, opacity 220ms ease';
  deck.appendChild(el);
  return el;
}

  function layout() {
    stackEls.forEach((el, i) => { 
      el.className = el.className.replace(/back1|back2/g, '').trim(); 
      el.style.zIndex = 100 - i; 
      if (i === 1) el.classList.add('back1'); 
      if (i === 2) el.classList.add('back2'); 
    });
  }

  function ensureStack() { while (stackEls.length < STACK_SIZE) stackEls.push(createCard(stackEls.length === 0)); layout(); attachTopHandlers(); }

  function attachTopHandlers() {
    stackEls.forEach(el => { el.onpointerdown = el.onpointermove = el.onpointerup = el.onpointercancel = null; });
    const top = stackEls[0]; if (!top) return;

    // Вопрос и Тапалку свайпать нельзя
    if (top.classList.contains('question-card') || top.classList.contains('tap-card')) return;

    top.onpointerdown = e => {
      if (isPrizeTriggered || prizeOverlay.classList.contains('active') || walletOverlay.classList.contains('active')) return;
      pulling = true; moved = false; pid = e.pointerId; top.setPointerCapture(pid);
      startX = e.clientX; startY = e.clientY; dx = dy = 0; top.style.transition = 'none';
    };
    top.onpointermove = e => {
      if (!pulling || e.pointerId !== pid) return;
      dx = e.clientX - startX; dy = e.clientY - startY; if (Math.abs(dx) + Math.abs(dy) > 6) moved = true;
      top.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${dx * 0.06}deg)`;
    };
    top.onpointerup = e => {
      if (!pulling || e.pointerId !== pid) return; pulling = false;
      const shouldSwipe = moved && Math.abs(dx) > 90;
      top.style.transition = 'transform 220ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease';
      if (shouldSwipe) swipeOut(top, dx > 0 ? 1 : -1); else { top.style.transform = 'translate(-50%,-50%)'; setTimeout(() => top.style.transition = 'transform 220ms ease, opacity 220ms ease', 0); }
    };
    top.onpointercancel = () => { pulling = false; top.style.transition = 'transform 220ms ease'; top.style.transform = 'translate(-50%,-50%)'; };
  }

  function swipeOut(el, dir) {
    const isSpecial = el.classList.contains("special");
    heartBurst(window.innerWidth/2, window.innerHeight/2, isSpecial ? 22 : 12);
    // +1 за обычную, +3 за золотую
    score += isSpecial ? 3 : 1; 
    updateScoreUI();
    if (!isInfiniteMode && score >= GOAL && !isPrizeTriggered) { isPrizeTriggered = true; setTimeout(triggerSuperPrize, 300); }
    el.style.opacity = '0'; el.style.transform = `translate(calc(-50% + ${dir * window.innerWidth * 0.9}px), calc(-50% + ${dy}px)) rotate(${dir * 18}deg)`;
    setTimeout(() => { removeTopCard(); dx = dy = 0; }, 200);
  }

  function updateScoreUI() {
    scoreText.innerHTML = isInfiniteMode ? `${score} / &infin;` : `${Math.min(score, GOAL)} / ${GOAL}`;
    scoreBoard.classList.remove('pop'); void scoreBoard.offsetWidth; scoreBoard.classList.add('pop');
  }

  // --- ИНИЦИАЛИЗАЦИЯ ---
  window.onload = () => { 
    saveCoupons(); 
    if (isInfiniteMode) restartBtn.classList.add('show'); 
    
    // ПРОВЕРКА: Если игра уже была запущена
    if (isGameStarted) {
      // Уже играли - показываем сразу, без анимаций входа
      showGameInstantly();
    } else {
      // Первый раз - показываем кнопку старта
      document.getElementById('startScreen').classList.add('active');
    }
  };
</script>
</body>
</html>
