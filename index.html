<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heart Jump 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-default">

<div id="desktop-msg">
    <h1>📱💕</h1>
    <p>Зайди с телефона, чтобы играть наклонами!</p>
</div>

<div id="game-wrapper">
    <!-- Декорации фона -->
    <div class="bg-decor sun-glow"></div>
    <div class="bg-decor cloud-1"></div>
    <div class="bg-decor cloud-2"></div>
    <div class="bg-decor birds"></div>
    <div class="bg-decor moon"></div>
    <div class="bg-decor stars"></div>

    <!-- HUD -->
    <div id="hud" style="display:none">
        <div id="score-val">0</div>
        <div class="hud-stats">Рекорд: <span id="best-val">0</span> | Всего: <span id="sum-val">0</span></div>
    </div>

    <div id="coin-hud" style="display:none">
        💰 <span id="coin-val">0</span>
    </div>

    <!-- Таймер магнита (теперь точно виден) -->
    <div id="magnet-timer-zone" style="display:none">
        <div class="magnet-label">Магнит 🧲</div>
        <div id="magnet-bar-container">
            <div id="magnet-bar"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- ЭКРАНЫ -->
    <div class="screen" id="menu-screen" style="background-image: url('bg.png'); background-size: cover; background-position: center;">
        <h1>Heart Jump</h1>
        <div class="subtitle">Для самой лучшей девочки 💕</div>
        <button class="btn" onclick="startGame()">Новая игра</button>
        <button class="btn secondary" onclick="showScreen('skins-screen')">Персонажи</button>
        <button class="btn secondary" onclick="showScreen('bg-screen')">Фоны</button>
        <button class="btn secondary" onclick="showScreen('ach-screen')">Достижения</button>
    </div>

    <div class="screen" id="menu-screen" style="background-image: url('bg.png'); background-size: cover; background-position: center;">
        <h1>Персонажи</h1>
        <div class="scroll-grid" id="skins-grid"></div>
        <button class="btn secondary" onclick="showScreen('menu-screen')">Назад</button>
    </div>

    <div class="screen" id="menu-screen" style="background-image: url('bg.png'); background-size: cover; background-position: center;">
        <div class="shop-header">Твои монетки: <span id="shop-coin-val">0</span> 💰</div>
        <h1>Магазин фонов</h1>
        <div class="scroll-grid" id="bg-grid"></div>
        <button class="btn secondary" onclick="showScreen('menu-screen')">Назад</button>
    </div>
        <div class="screen" id="ach-screen" style="background-image: url('bg.png'); background-size: cover; background-position: center;">
        <h1>Достижения</h1>
        <div class="ach-list" id="ach-list"></div>
        <button class="btn secondary" onclick="showScreen('menu-screen')">Назад</button>
    </div>

    <div class="screen" id="gameover-screen" style="display:none">
        <h1 id="go-title">Не расстраивайся!</h1>
        <div class="subtitle" id="go-msg"></div>
        <button class="btn" onclick="startGame()">Еще раз</button>
        <button class="btn secondary" onclick="showScreen('menu-screen')">В меню</button>
    </div>

    <div id="ach-toast"></div>
</div>

<script src="game.js"></script>
</body>
</html>
